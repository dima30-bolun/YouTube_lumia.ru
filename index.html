<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YouTube – обход блокировок</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f9f9f9; font-size: 14px; }
        .header { background: white; border-bottom: 1px solid #ddd; padding: 8px 12px; overflow: hidden; }
        .header-left { float: left; }
        .header-center { float: left; width: 50%; margin: 0 2%; }
        .header-right { float: right; }
        .logo-icon { font-size: 20px; font-weight: bold; cursor: pointer; display: inline-block; color: #ff0000; }
        .search-form input { width: 75%; padding: 6px; border: 1px solid #ccc; border-right: none; }
        .search-form button { width: 20%; padding: 6px; background: #f0f0f0; border: 1px solid #ccc; border-left: none; cursor: pointer; }
        .avatar { width: 32px; height: 32px; background: #6b6b6b; border-radius: 50%; text-align: center; line-height: 32px; color: white; display: inline-block; cursor: pointer; margin-left: 10px; }
        .sidebar { float: left; width: 220px; background: white; border-right: 1px solid #ddd; min-height: 100vh; padding: 10px 0; }
        .sidebar-item { display: block; padding: 8px 20px; cursor: pointer; }
        .sidebar-item:hover { background: #f0f0f0; }
        .sidebar-item.active { background: #e5e5e5; font-weight: bold; }
        .main-content { margin-left: 220px; padding: 16px; }
        .video-grid { overflow: hidden; }
        .video-card { float: left; width: 31%; margin: 0 1% 20px 1%; background: white; border-radius: 8px; cursor: pointer; }
        .thumbnail img { width: 100%; display: block; border-radius: 8px; }
        .video-details { padding: 8px; overflow: hidden; }
        .channel-avatar { float: left; width: 36px; height: 36px; background: #aaa; border-radius: 50%; margin-right: 10px; }
        .video-info { float: left; width: calc(100% - 46px); }
        .video-title { font-weight: bold; margin-bottom: 4px; }
        .channel-name, .video-meta { font-size: 12px; color: #606060; cursor: pointer; }
        .watch-container { max-width: 1200px; margin: 0 auto; }
        .watch-main { float: left; width: 66%; }
        .watch-sidebar { float: right; width: 30%; }
        .video-player iframe { width: 100%; height: 400px; border: none; }
        .watch-title { font-size: 18px; margin: 12px 0; }
        .watch-actions { overflow: hidden; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 16px; }
        .subscribe-btn { background: #0f0f0f; color: white; border: none; padding: 6px 14px; border-radius: 20px; cursor: pointer; }
        .subscribe-btn.subscribed { background: #f0f0f0; color: black; border: 1px solid #ccc; }
        .like-dislike { float: right; background: #f0f0f0; border-radius: 40px; padding: 2px 8px; }
        .like-btn, .dislike-btn { background: none; border: none; padding: 4px 8px; cursor: pointer; }
        .like-btn.active, .dislike-btn.active { background: #ccc; }
        .share-btn, .download-btn { background: #f0f0f0; border: none; padding: 6px 12px; border-radius: 40px; cursor: pointer; display: inline-block; margin-left: 8px; }
        .comment-section { margin-top: 20px; }
        .comment-input { overflow: hidden; margin-bottom: 16px; }
        .comment-input input { width: 70%; padding: 6px; border: 1px solid #ccc; float: left; }
        .comment-input button { float: left; background: #065fd4; color: white; border: none; padding: 6px 12px; margin-left: 8px; cursor: pointer; }
        .comment { overflow: hidden; margin-bottom: 12px; }
        .comment-avatar { float: left; width: 32px; height: 32px; background: #ccc; border-radius: 50%; margin-right: 10px; }
        .comment-text { float: left; width: calc(100% - 45px); background: #f2f2f2; padding: 8px 12px; border-radius: 18px; }
        .suggestion-item { overflow: hidden; margin-bottom: 12px; cursor: pointer; }
        .suggestion-thumb { float: left; width: 120px; margin-right: 12px; }
        .suggestion-thumb img { width: 100%; }
        .suggestion-info { float: left; width: calc(100% - 135px); }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #323232; color: white; padding: 6px 12px; border-radius: 20px; opacity: 0; transition: opacity 0.2s; z-index: 200; }
        @media (max-width: 800px) { .sidebar { display: none; } .main-content { margin-left: 0; } .video-card { width: 48%; } .watch-main, .watch-sidebar { float: none; width: 100%; } }
        @media (max-width: 550px) { .video-card { width: 98%; } }
    </style>
</head>
<body>
<div class="header">
    <div class="header-left"><span class="logo-icon" id="logoBtn">YouTube</span></div>
    <div class="header-center"><div class="search-form"><input type="text" id="searchInput" placeholder="Поиск"><button id="searchBtn">🔍</button></div></div>
    <div class="header-right"><div class="avatar" id="avatarMock">Ю</div></div>
</div>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-item active" data-nav="home">🏠 Главная</div>
        <div class="sidebar-item" data-nav="subscriptions">📺 Подписки</div>
        <div id="subscriptionsList"></div>
    </div>
    <div class="main-content">
        <div id="homeContainer" class="video-grid"></div>
        <div id="watchContainer" style="display:none;"></div>
        <div id="channelContainer" style="display:none;"></div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    const YOUTUBE_API_KEY = 'AIzaSyAVW5CcOl4xoWxB_loSRzOcnXDpcq_Io3Q'; // рабочий ключ
    // CORS-прокси, чтобы обойти блокировку API YouTube
    const CORS_PROXY = 'https://cors-anywhere.herokuapp.com/';
    // Если CORS-прокси заблокирован, используем резервный
    const CORS_BACKUP = 'https://api.allorigins.win/raw?url=';
    
    let currentList = [];
    let subscriptions = JSON.parse(localStorage.getItem('subs') || '{}');
    let likes = JSON.parse(localStorage.getItem('likes') || '{}');
    let comments = JSON.parse(localStorage.getItem('comments') || '{}');
    let nextPageToken = null;
    let isLoading = false;

    const homeDiv = document.getElementById('homeContainer');
    const watchDiv = document.getElementById('watchContainer');
    const channelDiv = document.getElementById('channelContainer');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const logoBtn = document.getElementById('logoBtn');
    const toastDiv = document.getElementById('toastMsg');

    // ========== УТИЛИТЫ ==========
    function showToast(msg, isErr) {
        toastDiv.innerHTML = msg;
        toastDiv.style.backgroundColor = isErr ? '#d32f2f' : '#323232';
        toastDiv.style.opacity = '1';
        setTimeout(() => { toastDiv.style.opacity = '0'; }, 3000);
    }
    function formatViews(v) { let n = parseInt(v); if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(0)+'K'; return n; }
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;': m==='>'?'&gt;': m); }

    function saveSubs() { localStorage.setItem('subs', JSON.stringify(subscriptions)); renderSubsList(); }
    function saveLikes() { localStorage.setItem('likes', JSON.stringify(likes)); }
    function saveComments() { localStorage.setItem('comments', JSON.stringify(comments)); }

    // ========== ЗАПРОСЫ К YOUTUBE API ЧЕРЕЗ CORS-ПРОКСИ ==========
    async function youtubeApiFetch(endpoint, params) {
        const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
        url.searchParams.append('key', YOUTUBE_API_KEY);
        for (let k in params) if (params[k]) url.searchParams.append(k, params[k]);
        // Пытаемся через основной прокси
        try {
            const res = await fetch(CORS_PROXY + url.toString(), {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            if (!res.ok) throw new Error('CORS proxy error');
            return await res.json();
        } catch (e) {
            // Резервный прокси
            const res2 = await fetch(CORS_BACKUP + encodeURIComponent(url.toString()));
            if (!res2.ok) throw new Error('Backup proxy error');
            const text = await res2.text();
            return JSON.parse(text);
        }
    }

    async function searchVideos(query, pageToken = null) {
        let params = { part: 'snippet', maxResults: 20, type: 'video' };
        if (query) params.q = query;
        else params.chart = 'mostPopular';
        if (pageToken) params.pageToken = pageToken;
        const data = await youtubeApiFetch('search', params);
        if (!data || !data.items) return { items: [], nextPageToken: null };
        const videoIds = data.items.map(i => i.id.videoId).join(',');
        let statsMap = {};
        if (videoIds) {
            const stats = await youtubeApiFetch('videos', { part: 'statistics', id: videoIds });
            if (stats && stats.items) stats.items.forEach(i => statsMap[i.id] = i.statistics);
        }
        const items = data.items.map(i => ({
            id: i.id.videoId,
            title: i.snippet.title,
            channelId: i.snippet.channelId,
            channelTitle: i.snippet.channelTitle,
            views: statsMap[i.id.videoId]?.viewCount || '0',
            publishedAt: i.snippet.publishedAt,
            thumb: i.snippet.thumbnails.medium.url
        }));
        return { items, nextPageToken: data.nextPageToken };
    }

    async function getRelatedVideos(videoId) {
        // Получаем похожие видео через API
        const data = await youtubeApiFetch('search', { part: 'snippet', relatedToVideoId: videoId, type: 'video', maxResults: 10 });
        if (!data || !data.items) return [];
        return data.items.map(i => ({
            id: i.id.videoId,
            title: i.snippet.title,
            channelTitle: i.snippet.channelTitle,
            thumb: i.snippet.thumbnails.medium.url,
            views: '0'
        }));
    }

    async function loadMore() {
        if (isLoading || !nextPageToken) return;
        isLoading = true;
        const q = searchInput.value.trim();
        const result = await searchVideos(q, nextPageToken);
        if (result.items.length) {
            currentList = [...currentList, ...result.items];
            nextPageToken = result.nextPageToken;
            appendVideos(result.items);
        }
        isLoading = false;
    }

    function appendVideos(items) {
        let html = '';
        for(let v of items) {
            html += `<div class="video-card" data-id="${v.id}">
                <div class="thumbnail"><img src="${v.thumb}"></div>
                <div class="video-details">
                    <div class="channel-avatar" data-channel-id="${v.channelId}"><img src="https://via.placeholder.com/36"></div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(v.title)}</div>
                        <div class="channel-name" data-channel-id="${v.channelId}">${escapeHtml(v.channelTitle)}</div>
                        <div class="video-meta">${formatViews(v.views)} просмотров</div>
                    </div>
                </div>
            </div>`;
        }
        homeDiv.insertAdjacentHTML('beforeend', html);
        attachCardEvents();
    }

    async function renderHome(reset = true) {
        if (reset) {
            currentList = [];
            nextPageToken = null;
            homeDiv.innerHTML = '';
        }
        if (currentList.length === 0) {
            homeDiv.innerHTML = '<div class="loader">Загрузка...</div>';
            const q = searchInput.value.trim();
            const result = await searchVideos(q, null);
            currentList = result.items;
            nextPageToken = result.nextPageToken;
            homeDiv.innerHTML = '';
            appendVideos(currentList);
        }
        const mainDiv = document.querySelector('.main-content');
        mainDiv.onscroll = () => {
            if (mainDiv.scrollTop + mainDiv.clientHeight >= mainDiv.scrollHeight - 200) loadMore();
        };
    }

    function attachCardEvents() {
        document.querySelectorAll('.video-card').forEach(card => {
            if (card.dataset.listener) return;
            card.dataset.listener = 'true';
            card.onclick = () => {
                const id = card.dataset.id;
                const video = currentList.find(v => v.id === id);
                if(video) openWatch(video);
            };
        });
        document.querySelectorAll('.channel-name, .channel-avatar').forEach(el => {
            if (el.dataset.listenerChan) return;
            el.dataset.listenerChan = 'true';
            el.onclick = (e) => { e.stopPropagation(); const chId = el.dataset.channelId; if(chId) openChannel(chId); };
        });
    }

    // ========== ПРОСМОТР ВИДЕО (через обычный iframe) ==========
    function openWatch(video) {
        homeDiv.style.display = 'none';
        watchDiv.style.display = 'block';
        channelDiv.style.display = 'none';
        renderWatch(video);
        if(window.history) history.pushState({ view: 'watch', id: video.id }, '', '?v='+video.id);
    }

    async function renderWatch(video) {
        let suggestions = await getRelatedVideos(video.id);
        let isSub = !!subscriptions[video.channelId];
        let likeStatus = likes[video.id];
        let likeCount = formatViews(parseInt(video.views)/100 + 500);
        let embedUrl = `https://www.youtube.com/embed/${video.id}?autoplay=0&rel=0`;
        let html = `<div class="watch-main">
            <div class="video-player"><iframe src="${embedUrl}" allowfullscreen></iframe></div>
            <div class="watch-title">${escapeHtml(video.title)}</div>
            <div class="watch-actions">
                <div class="channel-info" style="float:left">
                    <button class="subscribe-btn ${isSub ? 'subscribed' : ''}" id="subBtn">${isSub ? 'Подписан' : 'Подписаться'}</button>
                </div>
                <div class="like-dislike">
                    <button class="like-btn ${likeStatus==='like' ? 'active' : ''}" id="likeBtn">👍 ${likeCount}</button>
                    <button class="dislike-btn ${likeStatus==='dislike' ? 'active' : ''}" id="dislikeBtn">👎</button>
                </div>
                <button class="share-btn" id="shareBtn">🔗 Поделиться</button>
                <button class="download-btn" id="downloadBtn">⬇️ Скачать</button>
            </div>
            <div class="comment-section">
                <div>Комментарии</div>
                <div class="comment-input">
                    <input type="text" id="commentInput" placeholder="Написать...">
                    <button id="postCommentBtn">Отправить</button>
                </div>
                <div id="commentsList"></div>
            </div>
        </div>
        <div class="watch-sidebar">
            <div>Рекомендации</div>
            <div id="suggestionsList">`;
        for(let sug of suggestions) {
            html += `<div class="suggestion-item" data-sug-id="${sug.id}">
                <div class="suggestion-thumb"><img src="${sug.thumb}"></div>
                <div class="suggestion-info">
                    <div class="suggestion-title">${escapeHtml(sug.title)}</div>
                    <div>${escapeHtml(sug.channelTitle)}</div>
                </div>
            </div>`;
        }
        html += `</div></div>`;
        watchDiv.innerHTML = html;

        document.getElementById('subBtn').onclick = () => {
            if(subscriptions[video.channelId]) {
                delete subscriptions[video.channelId];
                document.getElementById('subBtn').className = 'subscribe-btn';
                document.getElementById('subBtn').innerHTML = 'Подписаться';
                showToast('Отписка');
            } else {
                subscriptions[video.channelId] = true;
                document.getElementById('subBtn').className = 'subscribe-btn subscribed';
                document.getElementById('subBtn').innerHTML = 'Подписан';
                showToast('Подписка');
            }
            saveSubs();
        };
        function updateLikeUI() {
            let status = likes[video.id];
            let count = formatViews(parseInt(video.views)/100 + 500);
            if(status==='like') count = formatViews(parseInt(video.views)/100 + 501);
            else if(status==='dislike') count = formatViews(parseInt(video.views)/100 + 499);
            document.getElementById('likeBtn').innerHTML = `👍 ${count}`;
            document.getElementById('likeBtn').className = status==='like' ? 'like-btn active' : 'like-btn';
            document.getElementById('dislikeBtn').className = status==='dislike' ? 'dislike-btn active' : 'dislike-btn';
        }
        document.getElementById('likeBtn').onclick = () => {
            if(likes[video.id]==='like') delete likes[video.id];
            else { likes[video.id]='like'; delete likes[video.id+'dis']; }
            saveLikes(); updateLikeUI(); showToast(likes[video.id]==='like' ? 'Лайк' : 'Лайк убран');
        };
        document.getElementById('dislikeBtn').onclick = () => {
            if(likes[video.id]==='dislike') delete likes[video.id];
            else { likes[video.id]='dislike'; delete likes[video.id+'like']; }
            saveLikes(); updateLikeUI(); showToast(likes[video.id]==='dislike' ? 'Дизлайк' : 'Дизлайк убран');
        };
        updateLikeUI();
        document.getElementById('shareBtn').onclick = () => {
            let url = `https://youtu.be/${video.id}`;
            if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>showToast('Ссылка скопирована')).catch(()=>fallback(url));
            else fallback(url);
            function fallback(t) { let ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('Ссылка скопирована'); }
        };
        document.getElementById('downloadBtn').onclick = () => { window.open('https://presaver.com', '_blank'); showToast('Открыт Presaver'); };
        function renderComments() {
            let listDiv = document.getElementById('commentsList');
            let cmts = comments[video.id] || [];
            let html = '';
            for(let c of cmts) html += `<div class="comment"><div class="comment-avatar"></div><div class="comment-text"><strong>${escapeHtml(c.author)}</strong><br>${escapeHtml(c.text)}</div></div>`;
            if(!html) html = '<div style="padding:12px;text-align:center;">Нет комментариев</div>';
            listDiv.innerHTML = html;
        }
        document.getElementById('postCommentBtn').onclick = () => {
            let inp = document.getElementById('commentInput');
            let txt = inp.value.trim();
            if(!txt) return;
            if(!comments[video.id]) comments[video.id] = [];
            comments[video.id].unshift({ author: 'Вы', text: txt });
            saveComments(); renderComments(); inp.value = ''; showToast('Комментарий добавлен');
        };
        renderComments();
        document.querySelectorAll('.suggestion-item').forEach(el => {
            el.onclick = () => {
                let sugId = el.dataset.sugId;
                let sugVideo = suggestions.find(v => v.id === sugId);
                if(sugVideo) openWatch(sugVideo);
            };
        });
        document.querySelectorAll('.channel-avatar, .channel-name').forEach(el => {
            el.onclick = (e) => { e.stopPropagation(); let chId = el.dataset.channelId; if(chId) openChannel(chId); };
        });
    }

    async function openChannel(channelId) {
        showToast('Загрузка канала...');
        // Упрощённо: просто показываем поиск по каналу
        searchInput.value = channelId;
        await performSearch();
        goHome();
    }

    function renderSubsList() {
        let subsDiv = document.getElementById('subscriptionsList');
        let html = '';
        let count = 0;
        for(let ch in subscriptions) {
            if(count++ >= 5) break;
            html += `<div class="sidebar-item" data-channel-id="${ch}">👤 ${ch.substring(0,8)}...</div>`;
        }
        if(!html) html = '<div class="sidebar-item">Нет подписок</div>';
        subsDiv.innerHTML = html;
        document.querySelectorAll('#subscriptionsList .sidebar-item').forEach(el => {
            el.onclick = () => { let chId = el.dataset.channelId; if(chId) openChannel(chId); };
        });
    }

    function goHome() {
        searchInput.value = '';
        homeDiv.style.display = 'block';
        watchDiv.style.display = 'none';
        channelDiv.style.display = 'none';
        renderHome(true);
        document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
        document.querySelector('.sidebar-item[data-nav="home"]').classList.add('active');
        if(window.history) history.pushState({ view: 'home' }, '', '/');
    }

    async function performSearch() {
        let q = searchInput.value.trim();
        if(q === '') q = '';
        await renderHome(true);
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    (async () => {
        if (!YOUTUBE_API_KEY || YOUTUBE_API_KEY === 'AIzaSyAVW5CcOl4xoWxB_loSRzOcnXDpcq_Io3Q') {
            showToast('⚠️ Используется тестовый API ключ. Возможно, его квота исчерпана.', true);
        }
        await renderHome();
        renderSubsList();
        searchBtn.onclick = performSearch;
        searchInput.onkeypress = e => { if(e.keyCode === 13) performSearch(); };
        logoBtn.onclick = goHome;
        document.getElementById('avatarMock').onclick = () => showToast('Аккаунт');
        document.querySelectorAll('.sidebar-item[data-nav]').forEach(el => {
            el.onclick = () => { if(el.dataset.nav === 'home') goHome(); else showToast('Раздел в разработке'); };
        });
        window.onpopstate = (e) => {
            if(e.state && e.state.view === 'watch' && e.state.id) {
                let video = currentList.find(v => v.id === e.state.id);
                if(video) openWatch(video);
            } else goHome();
        };
    })();
</script>
</body>
</html>
